<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>시뮬레이터 — 변수와 객체</title>
<style>
:root {
  --bg: #ffffff;
  --bg-soft: #f7f7f5;
  --bg-card: #fcfcfa;
  --border: #e5e5e0;
  --text: #1a1a1a;
  --text-soft: #4a4a4a;
  --text-mute: #888880;
  --accent: #c1440e;
  --accent-soft: #f5e8e0;
  --heap-bg: #eaf3fb;
  --heap-border: #3b6ea8;
  --heap-text: #1e5a8e;
  --names-bg: #fef3e8;
  --names-border: #d97706;
  --names-text: #7a3a10;
  --code-bg: #2b2b2b;
  --code-text: #a9b7c6;
  --code-keyword: #cc7832;
  --code-number: #6897bb;
  --code-string: #6a8759;
  --code-comment: #808080;
  --code-builtin: #ffc66d;
}
[data-theme="dark"] {
  --bg: #1a1a1a;
  --bg-soft: #232320;
  --bg-card: #252522;
  --border: #3a3a35;
  --text: #ececec;
  --text-soft: #c4c4c0;
  --text-mute: #888880;
  --accent: #e07a4f;
  --accent-soft: #3a2a22;
  --heap-bg: #1f3650;
  --heap-border: #5b8fc5;
  --heap-text: #92c5f0;
  --names-bg: #3a2a18;
  --names-border: #d97706;
  --names-text: #f4b070;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  padding: 24px;
  background: var(--bg);
  color: var(--text);
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  line-height: 1.6;
}
.sim-wrapper {
  max-width: 920px;
  margin: 0 auto;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.sim-head { padding: 20px 28px; border-bottom: 2px solid var(--accent); }
.sim-head h2 { margin: 0 0 4px; font-size: 18px; font-weight: 700; }
.sim-head .desc { margin: 0; color: var(--text-soft); font-size: 13px; }
.sim-body {
  display: grid;
  grid-template-columns: 1fr 1.4fr;
}
@media (max-width: 720px) { .sim-body { grid-template-columns: 1fr; } }
.code-pane {
  background: var(--code-bg);
  padding: 20px 24px;
  font-family: 'JetBrains Mono', 'D2Coding', 'Consolas', monospace;
  font-size: 14px;
  line-height: 1.9;
  color: var(--code-text);
}
.code-line {
  display: block;
  padding: 2px 8px;
  border-radius: 3px;
  transition: background 0.3s, opacity 0.3s;
  opacity: 0.4;
}
.code-line.active {
  background: rgba(255, 198, 109, 0.15);
  opacity: 1;
  border-left: 3px solid #ffc66d;
  margin-left: -3px;
}
.code-line.done { opacity: 0.65; }
.tk-kw { color: var(--code-keyword); font-weight: bold; }
.tk-num { color: var(--code-number); }
.tk-str { color: var(--code-string); }
.tk-com { color: var(--code-comment); font-style: italic; }
.tk-fn { color: var(--code-builtin); }
.canvas-pane {
  background: var(--bg-soft);
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 380px;
}
.canvas-pane svg { width: 100%; height: auto; max-height: 400px; }
.explain {
  padding: 18px 28px;
  border-top: 1px solid var(--border);
  background: var(--bg);
  min-height: 84px;
}
.explain .step-num {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 4px;
  text-transform: uppercase;
}
.explain .step-title {
  font-size: 15px;
  font-weight: 600;
  margin: 0 0 6px;
}
.explain .step-text {
  font-size: 13.5px;
  color: var(--text-soft);
  margin: 0;
  line-height: 1.65;
}
.controls {
  padding: 14px 24px 18px;
  background: var(--bg-card);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.btn {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 14px;
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  color: var(--text);
  transition: all 0.15s;
  font-weight: 500;
}
.btn:hover { background: var(--bg-soft); border-color: var(--accent); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn-icon { width: 36px; padding: 7px 0; text-align: center; }
.dots { display: flex; gap: 5px; margin-left: auto; }
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.2s, transform 0.2s;
}
.dot.active { background: var(--accent); transform: scale(1.4); }
.dot.done { background: var(--text-mute); }
.kbd-hint {
  font-size: 11px;
  color: var(--text-mute);
  font-family: 'JetBrains Mono', monospace;
}
@media (max-width: 720px) { .kbd-hint { display: none; } }
</style>
</head>
<body>

<div class="sim-wrapper">
  <div class="sim-head">
    <h2>변수와 객체 — <code style="font-family:monospace; color:var(--accent)">x = 2 + 3</code> 이 실행될 때</h2>
    <p class="desc">파이썬은 값을 변수에 "담지" 않습니다. 객체를 만들고, 변수는 그 객체를 가리킬 뿐입니다.</p>
  </div>

  <div class="sim-body">
    <div class="code-pane">
      <span class="code-line" data-line="0"><span class="tk-com"># 두 객체를 만들고, 합을 x가 가리키게 합니다</span></span>
      <span class="code-line" data-line="1">x <span class="tk-kw">=</span> <span class="tk-num">2</span> <span class="tk-kw">+</span> <span class="tk-num">3</span></span>
      <span class="code-line" data-line="2"><span class="tk-fn">print</span>(x)</span>
      <span class="code-line" data-line="3"><span class="tk-fn">print</span>(<span class="tk-fn">id</span>(x))  <span class="tk-com"># 객체의 고유 번호</span></span>
    </div>

    <div class="canvas-pane">
      <svg id="memory-svg" viewBox="0 0 540 400" xmlns="http://www.w3.org/2000/svg">
        <text x="100" y="28" text-anchor="middle" font-family="Pretendard, sans-serif"
              font-size="11" font-weight="700" fill="currentColor" letter-spacing="2"
              opacity="0.85">VARIABLES</text>
        <text x="100" y="44" text-anchor="middle" font-family="Pretendard, sans-serif"
              font-size="11" fill="currentColor" opacity="0.6">변수 (이름표)</text>
        <rect x="20" y="58" width="160" height="320" rx="8"
              fill="var(--names-bg)" stroke="var(--names-border)" stroke-width="1.5"
              stroke-dasharray="4 3" opacity="0.5"/>
        <text x="380" y="28" text-anchor="middle" font-family="Pretendard, sans-serif"
              font-size="11" font-weight="700" fill="currentColor" letter-spacing="2"
              opacity="0.85">OBJECTS (HEAP)</text>
        <text x="380" y="44" text-anchor="middle" font-family="Pretendard, sans-serif"
              font-size="11" fill="currentColor" opacity="0.6">객체들이 사는 곳</text>
        <rect x="220" y="58" width="300" height="320" rx="8"
              fill="var(--heap-bg)" stroke="var(--heap-border)" stroke-width="1.5"
              stroke-dasharray="4 3" opacity="0.45"/>
        <g id="dynamic"></g>
      </svg>
    </div>
  </div>

  <div class="explain">
    <div class="step-num" id="step-num">STEP 1 / 7</div>
    <div class="step-title" id="step-title">시작 — 빈 메모리</div>
    <p class="step-text" id="step-text">아직 아무것도 만들어지지 않았습니다.</p>
  </div>

  <div class="controls">
    <button class="btn btn-icon" id="btn-restart" title="처음부터">⟲</button>
    <button class="btn btn-icon" id="btn-prev" title="이전">←</button>
    <button class="btn btn-primary" id="btn-next">다음 →</button>
    <button class="btn" id="btn-auto">▶ 자동재생</button>
    <span class="kbd-hint">← / → / R</span>
    <div class="dots" id="dots"></div>
  </div>
</div>

<script>
(function() {
  'use strict';
  const SVG_NS = 'http://www.w3.org/2000/svg';
  const dynamic = document.getElementById('dynamic');

  function el(tag, attrs, children) {
    const e = document.createElementNS(SVG_NS, tag);
    if (attrs) Object.keys(attrs).forEach(k => e.setAttribute(k, attrs[k]));
    if (children) (Array.isArray(children) ? children : [children]).forEach(c => {
      if (typeof c === 'string') e.appendChild(document.createTextNode(c));
      else if (c) e.appendChild(c);
    });
    return e;
  }

  function drawObject(opts) {
    const g = el('g', { transform: `translate(${opts.x}, ${opts.y})` });
    g.appendChild(el('rect', {
      x: 0, y: 0, width: 110, height: 60, rx: 6,
      fill: 'var(--bg)', stroke: 'var(--heap-border)', 'stroke-width': 2
    }));
    g.appendChild(el('text', {
      x: 8, y: 14,
      'font-family': 'JetBrains Mono, monospace', 'font-size': 9,
      fill: 'var(--heap-text)', 'font-weight': 600
    }, opts.label || 'int'));
    g.appendChild(el('text', {
      x: 55, y: 40, 'text-anchor': 'middle',
      'font-family': 'JetBrains Mono, monospace', 'font-size': 22,
      'font-weight': 700, fill: 'currentColor'
    }, String(opts.value)));
    if (opts.addr) {
      g.appendChild(el('text', {
        x: 102, y: 55, 'text-anchor': 'end',
        'font-family': 'JetBrains Mono, monospace', 'font-size': 8,
        fill: 'currentColor', opacity: 0.45
      }, '@' + opts.addr));
    }
    return g;
  }

  function drawNameTag(opts) {
    const g = el('g', { transform: `translate(${opts.x}, ${opts.y})` });
    g.appendChild(el('path', {
      d: 'M 0,12 L 10,0 L 90,0 L 90,24 L 10,24 Z',
      fill: 'var(--names-bg)',
      stroke: 'var(--names-border)',
      'stroke-width': 1.5
    }));
    g.appendChild(el('text', {
      x: 50, y: 17, 'text-anchor': 'middle',
      'font-family': 'JetBrains Mono, monospace', 'font-size': 14,
      'font-weight': 700, fill: 'var(--names-text)'
    }, opts.name));
    return g;
  }

  let arrowCounter = 0;
  function drawArrow(opts) {
    const g = el('g');
    const color = opts.color || 'var(--accent)';
    const markerId = 'arr-' + (++arrowCounter);
    const defs = el('defs');
    defs.appendChild(el('marker', {
      id: markerId, viewBox: '0 0 10 10', refX: 9, refY: 5,
      markerWidth: 6, markerHeight: 6, orient: 'auto'
    }, [el('path', { d: 'M0,0 L10,5 L0,10 z', fill: color })]));
    g.appendChild(defs);
    const cx = (opts.fromX + opts.toX) / 2;
    g.appendChild(el('path', {
      d: `M ${opts.fromX} ${opts.fromY} Q ${cx} ${opts.fromY}, ${opts.toX} ${opts.toY}`,
      fill: 'none', stroke: color, 'stroke-width': 2.5,
      'marker-end': `url(#${markerId})`
    }));
    return g;
  }

  function drawOutput(opts) {
    const g = el('g');
    g.appendChild(el('rect', {
      x: opts.x, y: opts.y, width: opts.w || 140, height: 32, rx: 4,
      fill: '#2b2b2b', stroke: '#4ec9b0', 'stroke-width': 1
    }));
    g.appendChild(el('text', {
      x: opts.x + (opts.w || 140) / 2, y: opts.y + 21, 'text-anchor': 'middle',
      'font-family': 'JetBrains Mono, monospace', 'font-size': 14,
      fill: '#d4d4d4'
    }, String(opts.text)));
    g.appendChild(el('text', {
      x: opts.x - 8, y: opts.y + 21, 'text-anchor': 'end',
      'font-family': 'Pretendard, sans-serif', 'font-size': 11,
      fill: 'currentColor', opacity: 0.6
    }, '화면 →'));
    return g;
  }

  // 모든 단계에서 보일 영구 객체들
  function objects(stage) {
    const arr = [];
    if (stage >= 1) arr.push(drawObject({ x: 240, y: 80, value: 2, addr: '0x7f01' }));
    if (stage >= 2) arr.push(drawObject({ x: 380, y: 80, value: 3, addr: '0x7f02' }));
    if (stage >= 3) arr.push(drawObject({ x: 290, y: 210, value: 5, addr: '0x7f0c' }));
    return arr;
  }

  const STEPS = [
    {
      line: 0,
      title: '시작 — 빈 메모리',
      text: '아직 아무것도 만들어지지 않았습니다. 왼쪽은 변수(이름표) 영역, 오른쪽은 객체 영역입니다.',
      render: () => {}
    },
    {
      line: 1,
      title: '1단계 — 정수 객체 2가 만들어짐',
      text: '식의 오른쪽부터 평가합니다. 먼저 숫자 2를 보고 파이썬은 메모리에 정수 객체(int)를 만듭니다. 객체에는 고유한 주소(id)가 있습니다.',
      render: () => objects(1).forEach(o => dynamic.appendChild(o))
    },
    {
      line: 1,
      title: '2단계 — 정수 객체 3이 만들어짐',
      text: '다음으로 숫자 3을 만듭니다. 또 다른 정수 객체가 메모리에 생깁니다. 별개의 객체이므로 주소도 다릅니다.',
      render: () => objects(2).forEach(o => dynamic.appendChild(o))
    },
    {
      line: 1,
      title: '3단계 — + 연산자가 새 객체를 만듦',
      text: '2 + 3 이 계산되면 결과 5는 또 다른 새 객체로 메모리에 만들어집니다. 2와 3 객체는 그대로 있고, 5 객체가 추가된 것입니다.',
      render: () => {
        objects(3).forEach(o => dynamic.appendChild(o));
        dynamic.appendChild(drawArrow({ fromX: 295, fromY: 145, toX: 320, toY: 200, color: 'currentColor' }));
        dynamic.appendChild(drawArrow({ fromX: 435, fromY: 145, toX: 360, toY: 200, color: 'currentColor' }));
        dynamic.appendChild(el('text', {
          x: 340, y: 175, 'text-anchor': 'middle',
          'font-family': 'JetBrains Mono, monospace', 'font-size': 18,
          fill: 'currentColor', opacity: 0.6
        }, '+'));
      }
    },
    {
      line: 1,
      title: '4단계 — 변수 x 가 만들어짐',
      text: '왼쪽의 x = 가 실행됩니다. 파이썬은 x라는 이름표를 만들고, 그 이름표가 방금 만든 5 객체를 가리키게 합니다. x 안에 5가 "담긴" 게 아니라, x가 5 객체를 "가리키는" 것입니다.',
      render: () => {
        objects(3).forEach(o => dynamic.appendChild(o));
        dynamic.appendChild(drawNameTag({ x: 60, y: 230, name: 'x' }));
        dynamic.appendChild(drawArrow({ fromX: 155, fromY: 242, toX: 290, toY: 240, color: 'var(--accent)' }));
      }
    },
    {
      line: 2,
      title: '5단계 — print(x) 가 5를 출력',
      text: 'print(x)는 x가 가리키는 객체를 따라가서 그 값을 화면에 보여줍니다. 이름표 x → 5 객체 → 출력 "5".',
      render: () => {
        objects(3).forEach(o => dynamic.appendChild(o));
        dynamic.appendChild(drawNameTag({ x: 60, y: 230, name: 'x' }));
        dynamic.appendChild(drawArrow({ fromX: 155, fromY: 242, toX: 290, toY: 240, color: 'var(--accent)' }));
        dynamic.appendChild(drawOutput({ x: 295, y: 305, w: 100, text: '5' }));
      }
    },
    {
      line: 3,
      title: '6단계 — id(x) 는 객체의 고유 번호',
      text: 'id(x)는 x가 가리키는 객체의 고유 번호(메모리 주소)를 알려줍니다. "이름표가 어떤 객체를 가리키고 있는가"를 직접 확인하는 방법입니다.',
      render: () => {
        objects(3).forEach(o => dynamic.appendChild(o));
        dynamic.appendChild(drawNameTag({ x: 60, y: 230, name: 'x' }));
        dynamic.appendChild(drawArrow({ fromX: 155, fromY: 242, toX: 290, toY: 240, color: 'var(--accent)' }));
        dynamic.appendChild(el('rect', {
          x: 380, y: 256, width: 28, height: 14, rx: 3,
          fill: 'var(--accent)', opacity: 0.85
        }));
        dynamic.appendChild(el('text', {
          x: 394, y: 266, 'text-anchor': 'middle',
          'font-family': 'JetBrains Mono, monospace', 'font-size': 8,
          fill: 'white', 'font-weight': 700
        }, 'id'));
        dynamic.appendChild(drawOutput({ x: 250, y: 305, w: 200, text: '140288751120140' }));
      }
    }
  ];

  let currentStep = 0;
  let autoTimer = null;

  const dotsEl = document.getElementById('dots');
  STEPS.forEach(() => {
    const d = document.createElement('div');
    d.className = 'dot';
    dotsEl.appendChild(d);
  });

  function render() {
    document.querySelectorAll('.code-line').forEach((el, i) => {
      el.classList.remove('active', 'done');
      const stepLine = STEPS[currentStep].line;
      if (i === stepLine) el.classList.add('active');
      else if (i < stepLine) el.classList.add('done');
    });
    while (dynamic.firstChild) dynamic.removeChild(dynamic.firstChild);
    STEPS[currentStep].render();
    document.getElementById('step-num').textContent = `STEP ${currentStep + 1} / ${STEPS.length}`;
    document.getElementById('step-title').textContent = STEPS[currentStep].title;
    document.getElementById('step-text').textContent = STEPS[currentStep].text;
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.remove('active', 'done');
      if (i === currentStep) d.classList.add('active');
      else if (i < currentStep) d.classList.add('done');
    });
    document.getElementById('btn-prev').disabled = currentStep === 0;
    const nextBtn = document.getElementById('btn-next');
    if (currentStep === STEPS.length - 1) {
      nextBtn.textContent = '완료';
      nextBtn.disabled = true;
    } else {
      nextBtn.textContent = '다음 →';
      nextBtn.disabled = false;
    }
  }

  function next() { if (currentStep < STEPS.length - 1) { currentStep++; render(); } }
  function prev() { if (currentStep > 0) { currentStep--; render(); } }
  function restart() { stopAuto(); currentStep = 0; render(); }
  function startAuto() {
    if (autoTimer) return;
    document.getElementById('btn-auto').textContent = '⏸ 일시정지';
    autoTimer = setInterval(() => {
      if (currentStep < STEPS.length - 1) next();
      else stopAuto();
    }, 2200);
  }
  function stopAuto() {
    if (autoTimer) {
      clearInterval(autoTimer);
      autoTimer = null;
      document.getElementById('btn-auto').textContent = '▶ 자동재생';
    }
  }

  document.getElementById('btn-next').addEventListener('click', () => { stopAuto(); next(); });
  document.getElementById('btn-prev').addEventListener('click', () => { stopAuto(); prev(); });
  document.getElementById('btn-restart').addEventListener('click', restart);
  document.getElementById('btn-auto').addEventListener('click', () => {
    if (autoTimer) stopAuto(); else startAuto();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') { stopAuto(); next(); e.preventDefault(); }
    else if (e.key === 'ArrowLeft') { stopAuto(); prev(); e.preventDefault(); }
    else if (e.key === 'r' || e.key === 'R') { restart(); e.preventDefault(); }
  });

  function syncTheme() {
    try {
      const parentTheme = window.parent && window.parent.document &&
                          window.parent.document.documentElement.getAttribute('data-theme');
      if (parentTheme) document.documentElement.setAttribute('data-theme', parentTheme);
    } catch (e) {
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    }
  }
  syncTheme();
  window.addEventListener('message', (e) => {
    if (e.data && e.data.theme) {
      document.documentElement.setAttribute('data-theme', e.data.theme);
    }
  });

  render();
})();
</script>

</body>
</html>
